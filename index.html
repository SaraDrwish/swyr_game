        { name: "Khamrah Qahwa", family: "Sweet", notes: "قهوة، كاكاو، فانيليا، توابل", description: "عطر قهوة غني ودافئ مثالي للأجواء الباردة.", image: DEFAULT_MALE_IMAGE, url: "", available: false },
        { name: "Armani Code", family: "Sweet", notes: "زنجبيل، ليمون، تونكا", description: "جاذبية ليلية. عطر حلو وجذاب.", image: DEFAULT_MALE_IMAGE, url: "", available: false },
        // عائلة المنعشة والرياضية (Fresh) - للاختيار "منعش وهادئ"
        { name: "أكوا دي جيو", family: "Fresh", notes: "ليمون، نوتة بحرية، ياسمين، خشب الأرز", description: "انتعاش أيقوني. عطر كلاسيكي للرجل النشيط.", image: "https://cdn.almatjar.org/swyr/media/28/acqua-di-gio-50ml.png", url: "https://swyr.almatjar.store/ar/p/acqua-di-gio-50ml-29", available: true },
        { name: "بي إم دبليو", family: "Fresh", notes: "برغموت، يوسفي، فلفل وردي، عنبر", description: "عطر منعش ورياضي، مستوحى من الفخامة والسرعة.", image: "https://cdn.almatjar.org/swyr/media/14/bmw-50ml.png", url: "https://swyr.almatjar.store/ar/p/bmw-50ml-35", available: true },
        { name: "بلاك لاكوست", family: "Fresh", notes: "بطيخ، لافندر، شوكولاتة، باتشولي", description: "عطر جذاب وعصري بمزيج فريد.", image: "https://cdn.almatjar.org/swyr/media/28/black-lacoste-50ml.png", url: "https://swyr.almatjar.store/ar/p/black-Eau-de-Lacoste-Noir-Lacoste-Fragrances-50ml-25", available: true },
        { name: "Versace Pour Homme", family: "Fresh", notes: "ليمون، نعناع بحري، زهر البرتقال", description: "أيام الصيف المنعشة. عطر كلاسيكي نظيف.", image: DEFAULT_MALE_IMAGE, url: "", available: false },
        { name: "D&G Light Blue", family: "Fresh", notes: "جريب فروت، عرعر، روزماري", description: "حيوية البحر المتوسط. منعش وحمضي.", image: DEFAULT_MALE_IMAGE, url: "", available: false },
        { name: "Davidoff Cool Water", family: "Fresh", notes: "أوزون، بحر، لافندر، ياسمين", description: "كلاسيكي الماء. عطر منعش خالد.", image: DEFAULT_MALE_IMAGE, url: "", available: false }
    ];

    // ---------- الأسئلة (4 أسئلة، كل سؤال 3 خيارات) ----------
    const QUESTIONS = [
        { text: "🌿 أي الأجواء تفضلينها؟", options: [
            { text: "منعش وهادئ (صباحي، عمل، طبيعة)", family: "Fresh" },
            { text: "دافئ وحلو (رومانسي، سهرة، شتاء)", family: "Sweet" },
            { text: "قوي وجذاب (مناسبات، حضور، ثقة)", family: "Woody" }
        ] },
        { text: "🌸 أي فئة من الروائح تجذبك؟", options: [
            { text: "أزهار ومسك - ناعمة ورقيقة", family: "Floral" },
            { text: "فانيليا وعنبر - دافئة وحلوة", family: "Sweet" },
            { text: "عود وتبغ - فخمة وقوية", family: "Woody" }
        ] },
        { text: "🎭 كيف تصفين شخصيتك؟", options: [
            { text: "هادئة، كلاسيكية، أنيقة", family: "Floral" },
            { text: "مرحة، جريئة، اجتماعية", family: "Fruity" },
            { text: "غامضة، قوية، قيادية", family: "Woody" }
        ] },
        { text: "⏰ متى تريدين أن تتألقي؟", options: [
            { text: "في النهار والصباح الباكر", family: "Fresh" },
            { text: "في المساء والسهرات", family: "Sweet" },
            { text: "في المناسبات الهامة والرسمية", family: "Woody" }
        ] }
    ];

    let currentGender = null;
    let selectedFamilies = [];
    let currentQuestionIndex = 0;
    let finalTopPrimary = null;
    let finalTopSecondary = [];

    const genderSection = document.getElementById('genderSection');
    const questionsContainer = document.getElementById('questionsContainer');
    const navButtonsDiv = document.getElementById('navButtons');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resultContainer = document.getElementById('resultContainer');

    function getDominantFamily() {
        let count = { Fresh: 0, Sweet: 0, Woody: 0, Floral: 0, Fruity: 0 };
        for (let fam of selectedFamilies) {
            if (count[fam] !== undefined) count[fam]++;
        }
        let maxFam = Object.keys(count).reduce((a, b) => count[a] > count[b] ? a : b, "Floral");
        return maxFam;
    }

    function getPerfumesByFamily(family) {
        let catalog = (currentGender === 'female' ? femalePerfumes : malePerfumes);
        let filtered = catalog.filter(p => p.family === family);
        if (filtered.length === 0) {
            if (family === "Fresh") filtered = catalog.filter(p => p.family === "Floral");
            else if (family === "Woody") filtered = catalog.filter(p => p.family === "Sweet");
            else if (family === "Sweet") filtered = catalog.filter(p => p.family === "Woody");
            else if (family === "Floral") filtered = catalog.filter(p => p.family === "Fresh");
            else if (family === "Fruity") filtered = catalog.filter(p => p.family === "Sweet");
        }
        return filtered;
    }

    function getValidUrl(perfume) {
        if (perfume.url && perfume.url.trim() !== "") {
            return perfume.url;
        }
        return STORE_BASE_URL;
    }

    function goToNext() {
        if (currentQuestionIndex + 1 < QUESTIONS.length) {
            currentQuestionIndex++;
            renderCurrentQuestion();
            updateNavButtons();
        } else {
            showResult();
        }
    }

    function renderCurrentQuestion() {
        if (!currentGender) return;
        const q = QUESTIONS[currentQuestionIndex];
        let html = `<div class="question-card"><div class="question-text">${currentQuestionIndex+1}. ${q.text}</div><div class="options">`;
        const letters = ['أ', 'ب', 'ج'];
        q.options.forEach((opt, idx) => {
            const isSelected = selectedFamilies[currentQuestionIndex] === opt.family;
            html += `<div class="option ${isSelected ? 'selected' : ''}" data-family="${opt.family}">
                        <span class="option-letter">${letters[idx]}</span>
                        <span>${opt.text}</span>
                    </div>`;
        });
        html += `</div></div>`;
        questionsContainer.innerHTML = html;
        document.querySelectorAll('.option').forEach(el => {
            el.addEventListener('click', () => {
                const family = el.getAttribute('data-family');
                selectedFamilies[currentQuestionIndex] = family;
                document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                el.classList.add('selected');
                goToNext();
            });
        });
    }

    function updateNavButtons() {
        if (currentQuestionIndex === QUESTIONS.length - 1) nextBtn.innerText = '✨ اكتشف عطرك ✨';
        else nextBtn.innerText = 'التالي ';
    }

    function getResultText() {
        if (!finalTopPrimary) return "";
        const genderText = currentGender === 'female' ? 'أنثى' : 'ذكر';
        let answersText = "";
        QUESTIONS.forEach((q, idx) => {
            let chosenFamily = selectedFamilies[idx];
            let chosenText = q.options.find(opt => opt.family === chosenFamily)?.text || "إجابة";
            answersText += `${idx+1}. ${q.text} → ${chosenText}\n`;
        });
        let primaryInfo = finalTopPrimary ? `- ${finalTopPrimary.name}\n   المكونات: ${finalTopPrimary.notes}\n   الوصف: ${finalTopPrimary.description}` : "";
        let secondaryInfo = finalTopSecondary.map(p => `- ${p.name}\n   المكونات: ${p.notes}\n   الوصف: ${p.description}`).join('\n\n');
        return `📋 نتيجة اختبار سوير:
🧬 الجنس: ${genderText}
📝 الإجابات:
${answersText}
✨ العطر الأقرب لشخصيتك:
${primaryInfo}
🌸 عطور أخرى تناسب ذوقك:
${secondaryInfo}
🔗 رابط الاختبار: ${window.location.href}
تم الإرسال من موقع سوير للعطور.`;
    }

    function sendToFacebookMessenger() {
        const resultText = getResultText();
        navigator.clipboard.writeText(resultText).then(() => {
            const pageId = "61563925810810";
            const messengerUrl = `https://m.me/${pageId}`;
            window.open(messengerUrl, '_blank');
            alert("✅ تم نسخ نتيجة الاختبار! سيتم فتح محادثة فيسبوك ماسنجر مع صفحة سوير، قومي بلصق النتيجة (اضغطي مع الاستمرار ثم لصق) وأرسليها.");
        }).catch(() => {
            alert("❌ فشل نسخ النتيجة، حاولي يدوياً تحديد النص ونسخه.");
        });
    }

    function showResult() {
        if (selectedFamilies.includes(undefined)) {
            alert("الرجاء اختيار إجابة لكل سؤال 💫");
            return;
        }
        let dominantFamily = getDominantFamily();
        let perfumes = getPerfumesByFamily(dominantFamily);
        if (perfumes.length === 0) {
            let allAvailable = (currentGender === 'female' ? femalePerfumes : malePerfumes);
            perfumes = allAvailable;
            if (perfumes.length === 0) {
                alert("⚠️ لا توجد عطور متاحة حالياً. يرجى تحديث قاعدة البيانات.");
                resetQuiz();
                return;
            }
        }
        // خلط عشوائي لتنويع النتائج
        for (let i = perfumes.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [perfumes[i], perfumes[j]] = [perfumes[j], perfumes[i]];
        }
        const topPrimary = perfumes[0];
        const topSecondary = perfumes.slice(1, 4);
        finalTopPrimary = topPrimary;
        finalTopSecondary = topSecondary;

        let tasteDesc = "";
        switch (dominantFamily) {
            case "Floral": tasteDesc = "🌺 زهري ناعم ورقيق - أنت شخصية رومانسية تحب الطبيعة والهدوء."; break;
            case "Sweet": tasteDesc = "🍯 دافئ وحلو وجذاب - شخصيتك حنونة ومحبوبة."; break;
            case "Woody": tasteDesc = "🌲 خشبي فخم وقوي - أنت قائد وغامض."; break;
            case "Fresh": tasteDesc = "🌊 منعش وحيوي - أنت نشيط وتحب الحرية."; break;
            case "Fruity": tasteDesc = "🍓 فاكهي مرح ومشرق - حياتك مليئة بالبهجة."; break;
            default: tasteDesc = "✨ توقيع سوير الخاص - ذوقك فريد.";
        }
        let tasteName = `ذوقك ${dominantFamily === "Floral" ? "الزهري" : dominantFamily === "Sweet" ? "الدافئ" : dominantFamily === "Woody" ? "الخشبي القوي" : dominantFamily === "Fresh" ? "المنعش" : "الفاكهي"}`;

        let perfumesHtml = `<div class="result-taste">🧪 ${tasteName}<div class="taste-description">${tasteDesc}</div></div>`;
        perfumesHtml += `<div class="recommendation-tier"><div class="tier-title">✨ أقرب عطر لشخصيتك ✨</div>
            <div class="perfume-item">
                <img class="perfume-image" src="${topPrimary.image}" alt="${topPrimary.name}" onerror="this.src='${currentGender === 'female' ? DEFAULT_FEMALE_IMAGE : DEFAULT_MALE_IMAGE}'">
                <div class="perfume-info">
                    <div class="perfume-name">${topPrimary.name}</div>
                    <div class="perfume-notes">🧴 المكونات: ${topPrimary.notes}</div>
                    <div class="perfume-description">📖 الوصف: ${topPrimary.description}</div>
                </div>
                <a href="${getValidUrl(topPrimary)}" target="_blank" class="perfume-link">🛍️ تسوق الآن</a>
            </div></div>`;
        perfumesHtml += `<div class="recommendation-tier"><div class="tier-title">🌸 عطور أخرى تناسب ذوقك (من نفس الفصيلة) 🌸</div><div class="perfume-list">`;
        topSecondary.forEach(p => {
            perfumesHtml += `<div class="perfume-item">
                                <img class="perfume-image" src="${p.image}" alt="${p.name}" onerror="this.src='${currentGender === 'female' ? DEFAULT_FEMALE_IMAGE : DEFAULT_MALE_IMAGE}'">
                                <div class="perfume-info">
                                    <div class="perfume-name">${p.name}</div>
                                    <div class="perfume-notes">🧴 المكونات: ${p.notes}</div>
                                    <div class="perfume-description">📖 الوصف: ${p.description}</div>
                                </div>
                                <a href="${getValidUrl(p)}" target="_blank" class="perfume-link">🛍️ تسوق الآن</a>
                            </div>`;
        });
        perfumesHtml += `</div></div>
        <div style="margin-top:20px; text-align:center;">
            <button id="sendFacebookBtn" class="facebook-share-btn">📩 إرسال النتيجة إلى فيسبوك (للسوير)</button>
            <p style="font-size:12px; margin-top:10px;">* سيتم نسخ نتيجة الاختبار وفتح محادثة ماسنجر مع صفحة سوير. قومي بلصق النتيجة وإرسالها.</p>
        </div>
        <div style="text-align:center; margin-top:15px;"><button id="restartBtn">🔄 إعادة الاختبار</button></div>`;

        resultContainer.innerHTML = perfumesHtml;
        resultContainer.classList.remove('hidden');
        questionsContainer.classList.add('hidden');
        navButtonsDiv.classList.add('hidden');
        genderSection.classList.add('hidden');

        document.getElementById('sendFacebookBtn').addEventListener('click', sendToFacebookMessenger);
        document.getElementById('restartBtn').addEventListener('click', resetQuiz);
    }

    function resetQuiz() {
        currentGender = null;
        selectedFamilies = [];
        currentQuestionIndex = 0;
        genderSection.classList.remove('hidden');
        questionsContainer.classList.add('hidden');
        navButtonsDiv.classList.add('hidden');
        resultContainer.classList.add('hidden');
        document.querySelectorAll('.gender-btn').forEach(btn => btn.classList.remove('active'));
    }

    function startQuiz(gender) {
        currentGender = gender;
        selectedFamilies = new Array(QUESTIONS.length).fill(undefined);
        genderSection.classList.add('hidden');
        questionsContainer.classList.remove('hidden');
        navButtonsDiv.classList.remove('hidden');
        currentQuestionIndex = 0;
        renderCurrentQuestion();
        updateNavButtons();
    }

    function nextStep() {
        if (selectedFamilies[currentQuestionIndex] === undefined) {
            alert("الرجاء اختيار إجابة قبل المتابعة 💫");
            return;
        }
        goToNext();
    }
    function prevStep() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderCurrentQuestion();
            updateNavButtons();
        }
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && !questionsContainer.classList.contains('hidden')) {
            event.preventDefault();
            nextStep();
        }
    });

    document.querySelectorAll('.gender-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const gender = btn.getAttribute('data-gender');
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            startQuiz(gender);
        });
    });
    prevBtn.addEventListener('click', prevStep);
    nextBtn.addEventListener('click', nextStep);

    questionsContainer.classList.add('hidden');
    navButtonsDiv.classList.add('hidden');
    resultContainer.classList.add('hidden');
</script>
</body>
</html>
