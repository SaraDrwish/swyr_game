        const q = QUESTIONS[currentQuestionIndex];
        let html = `<div class="question-card"><div class="question-text">${currentQuestionIndex+1}. ${q.text}</div><div class="options">`;
        const letters = ['أ', 'ب', 'ج', 'د'];
        q.options.forEach((opt, idx) => {
            const isSelected = answersPoints[currentQuestionIndex] === opt.points;
            html += `<div class="option ${isSelected ? 'selected' : ''}" data-points='${JSON.stringify(opt.points)}'>
                        <span class="option-letter">${letters[idx]}</span>
                        <span>${opt.text}</span>
                    </div>`;
        });
        html += `</div></div>`;
        questionsContainer.innerHTML = html;
        
        // إضافة مستمعي الأحداث للخيارات: عند النقر، نحفظ الاختيار ثم ننتقل تلقائيًا للسؤال التالي
        document.querySelectorAll('.option').forEach(el => {
            el.addEventListener('click', () => {
                const pointsObj = JSON.parse(el.getAttribute('data-points'));
                answersPoints[currentQuestionIndex] = pointsObj;
                document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                el.classList.add('selected');
                // الانتقال التلقائي بعد اختيار الإجابة
                goToNext();
            });
        });
    }

    function updateNavButtons() {
        if (currentQuestionIndex === QUESTIONS.length - 1) nextBtn.innerText = '✨ اكتشف عطرك ✨';
        else nextBtn.innerText = 'التالي ';
    }

    function calculateTopPerfumes() {
        const scores = { Floral:0, Amber:0, Woody:0, Fresh:0, Fruity:0, Citrus:0, Sweet:0, Leather:0, Green:0, Vanilla:0, Powdery:0, Musk:0, Oriental:0, Spicy:0, Oud:0 };
        for (let ans of answersPoints) if (ans) for (let [fam, pts] of Object.entries(ans)) scores[fam] = (scores[fam]||0) + pts;
        
        let topFamily = Object.keys(scores).reduce((a,b) => scores[a] > scores[b] ? a : b, "Floral");
        
        let tasteName = "";
        let tasteDescription = "";
        let primaryFamily = "";
        if (topFamily === "Floral" || topFamily === "White Floral") {
            tasteName = "🌺 زهري ناعم ورقيق";
            tasteDescription = "أنت شخصية تميل للرقة والأنوثة/الأناقة، وتحبين/تحب الأجواء الهادئة والطبيعة. العطور الزهرية تمنحك إحساسًا بالصفاء والجمال البسيط.";
            primaryFamily = "Floral";
        } else if (topFamily === "Amber" || topFamily === "Vanilla" || topFamily === "Sweet") {
            tasteName = "🍯 دافئ وحلو وجذاب";
            tasteDescription = "لديك/لديكِ شخصية دافئة وحنونة، تحبين/تحب الراحة والأجواء الرومانسية. العطور الدافئة والحلوة تعكس دفئك الداخلي وتجعلك محط الأنظار.";
            primaryFamily = "Amber";
        } else if (topFamily === "Woody" || topFamily === "Oud" || topFamily === "Leather") {
            tasteName = "🌲 خشبي فخم وقوي";
            tasteDescription = "شخصيتك قوية وغامضة، تحبين/تحب التميز والحضور اللافت. العطور الخشبية والعود تمنحك الثقة والهيبة.";
            primaryFamily = "Woody";
        } else if (topFamily === "Fresh" || topFamily === "Citrus" || topFamily === "Green") {
            tasteName = "🌊 منعش رياضي وحيوي";
            tasteDescription = "أنت شخصية نشيطة ورياضية، تحبين/تحب النشاط والانطلاق. العطور المنعشة تمنحك طاقة إيجابية وانتعاشًا طوال اليوم.";
            primaryFamily = "Fresh";
        } else if (topFamily === "Fruity" || topFamily === "Berries") {
            tasteName = "🍓 فاكهي مرح ومشرق";
            tasteDescription = "شخصيتك مرحة وجريئة، تحبين/تحب التجديد والأجواء المبهجة. العطور الفاكهية تعكس حيوتك وتضفي لمسة من البهجة.";
            primaryFamily = "Fruity";
        } else {
            tasteName = "✨ توقيع سوير الخاص";
            tasteDescription = "ذوقك فريد ومتنوع، تحبين/تحب المزج بين أكثر من فئة عطرية. أنت شخصية متجددة ومحبة للاستكشاف.";
            primaryFamily = "Floral";
        }
        
        let filtered = PERFUMES_CATALOG.filter(p => p.gender === currentGender || p.gender === "unisex");
        let scored = filtered.map(p => {
            let score = 0;
            if (p.family === primaryFamily) score += 5;
            if (p.family === "Floral" && primaryFamily === "Floral") score += 3;
            if (p.family === "Amber" && primaryFamily === "Amber") score += 3;
            if (p.family === "Woody" && primaryFamily === "Woody") score += 3;
            if (p.family === "Fresh" && primaryFamily === "Fresh") score += 3;
            if (p.family === "Fruity" && primaryFamily === "Fruity") score += 3;
            if (scores[p.family]) score += scores[p.family];
            if (scores[p.family] > 0) score += 1;
            return { ...p, score };
        });
        scored.sort((a,b) => b.score - a.score);
        const topPerfume = scored[0];
        let sameFamily = scored.filter(p => p.family === topPerfume.family || (Math.abs(p.score - topPerfume.score) < 3));
        let secondary = sameFamily.slice(1, 4);
        if (secondary.length < 3) {
            let others = scored.filter(p => !secondary.includes(p) && p.name !== topPerfume.name);
            secondary = [...secondary, ...others.slice(0, 3 - secondary.length)];
        }
        return { tasteName, tasteDescription, topPrimary: topPerfume, topSecondary: secondary.slice(0,3) };
    }

    function getUserAnswersText() {
        let text = "";
        QUESTIONS.forEach((q, idx) => {
            let chosen = answersPoints[idx];
            if (chosen) {
                let chosenText = q.options.find(opt => JSON.stringify(opt.points) === JSON.stringify(chosen))?.text || "إجابة";
                text += `${idx+1}. ${q.text} → ${chosenText}\n`;
            }
        });
        return text;
    }

    function getFullUserData() {
        const genderText = currentGender === 'female' ? 'أنثى' : 'ذكر';
        let answersText = getUserAnswersText();
        let primaryPerfume = lastTopPrimary ? `- ${lastTopPrimary.name}\n   المكونات: ${lastTopPrimary.notes}\n   الوصف: ${lastTopPrimary.description}` : "";
        let secondaryList = lastTopSecondary.map(p => `- ${p.name}\n   المكونات: ${p.notes}\n   الوصف: ${p.description}`).join('\n\n');
        return `📋 نتيجة اختبار سوير:
🧬 الجنس: ${genderText}
📝 الإجابات:
${answersText}
✨ العطر الأقرب لشخصيتك:
${primaryPerfume}
🌸 عطور أخرى تناسب ذوقك (نفس الفصيلة):
${secondaryList}
🔗 رابط الاختبار: ${window.location.href}
تم الإرسال من موقع سوير للعطور.`;
    }

    function sendToWhatsApp() {
        const data = encodeURIComponent(getFullUserData());
        const adminPhone = "9665XXXXXXXX"; // غيّر الرقم هنا
        const url = `https://wa.me/${adminPhone}?text=${data}`;
        window.open(url, '_blank');
        alert("📲 تم فتح واطل منهم الان عطرك المفضل واتساب، أرسل الرسالة لتصل بياناتك إلى فريق سوير ✅");
    }

    function showResult() {
        if (answersPoints.some(a => !a)) {
            alert("الرجاء اختيار إجابة قبل المتابعة 💫");
            return;
        }
        const { tasteName, tasteDescription, topPrimary, topSecondary } = calculateTopPerfumes();
        lastTopPrimary = topPrimary;
        lastTopSecondary = topSecondary;
        
        let perfumesHtml = `<div class="result-taste">🧪 ذوقك العطري: ${tasteName}<div class="taste-description">${tasteDescription}</div></div>`;
        
        perfumesHtml += `<div class="recommendation-tier"><div class="tier-title">✨ أقرب عطر لشخصيتك ✨</div>
            <div class="perfume-item">
                <img class="perfume-image" src="${topPrimary.image || 'https://via.placeholder.com/60/FFB2DA/5C4545?text=SWYR'}" alt="${topPrimary.name}">
                <div class="perfume-info">
                    <div class="perfume-name">${topPrimary.name}</div>
                    <div class="perfume-notes">🧴 المكونات الأساسية: ${topPrimary.notes}</div>
                    <div class="perfume-description">📖 الوصف: ${topPrimary.description}</div>
                </div>
                <a href="${topPrimary.url}" target="_blank" class="perfume-link">🛍️ تسوق الآن</a>
            </div></div>`;
        
        perfumesHtml += `<div class="recommendation-tier"><div class="tier-title">🌸 عطور أخرى تناسب ذوقك (من نفس الفصيلة) 🌸</div><div class="perfume-list">`;
        topSecondary.forEach(p => {
            perfumesHtml += `<div class="perfume-item">
                                <img class="perfume-image" src="${p.image || 'https://via.placeholder.com/60/FFB2DA/5C4545?text=SWYR'}" alt="${p.name}">
                                <div class="perfume-info">
                                    <div class="perfume-name">${p.name}</div>
                                    <div class="perfume-notes">🧴 المكونات: ${p.notes}</div>
                                    <div class="perfume-description">📖 الوصف: ${p.description}</div>
                                </div>
                                <a href="${p.url}" target="_blank" class="perfume-link">🛍️ تسوق الآن</a>
                            </div>`;
        });
        perfumesHtml += `</div></div>
        <div style="margin-top:20px; text-align:center;">
            <button id="sendWhatsappBtn" class="single-wa-btn"> وطالب منهم عطرك المفضل 📤 ارسل نتيجة الاختبار إلى سوير  </button>
            <p style="font-size:12px; margin-top:10px;">* سيتم إرسال اختياراتك ونتيجتك إلى فريق سوير لمساعدتك في اختيار عطرك المثالي.</p>
        </div>
        <div style="text-align:center; margin-top:15px;"><button id="restartBtn">🔄 إعادة الاختبار</button></div>`;
        
        resultContainer.innerHTML = perfumesHtml;
        resultContainer.classList.remove('hidden');
        questionsContainer.classList.add('hidden');
        navButtonsDiv.classList.add('hidden');
        genderSection.classList.add('hidden');
        
        document.getElementById('sendWhatsappBtn').addEventListener('click', sendToWhatsApp);
        document.getElementById('restartBtn').addEventListener('click', resetQuiz);
    }

    function resetQuiz() {
        currentGender = null;
        answersPoints = [];
        currentQuestionIndex = 0;
        genderSection.classList.remove('hidden');
        questionsContainer.classList.add('hidden');
        navButtonsDiv.classList.add('hidden');
        resultContainer.classList.add('hidden');
        document.querySelectorAll('.gender-btn').forEach(btn => btn.classList.remove('active'));
    }

    function startQuiz(gender) {
        currentGender = gender;
        answersPoints = new Array(QUESTIONS.length).fill(null);
        genderSection.classList.add('hidden');
        questionsContainer.classList.remove('hidden');
        navButtonsDiv.classList.remove('hidden');
        currentQuestionIndex = 0;
        renderCurrentQuestion();
        updateNavButtons();
    }

    // دالة nextStep المعدلة: تتحقق من وجود إجابة ثم تنتقل
    function nextStep() {
        if (!answersPoints[currentQuestionIndex]) {
            alert("الرجاء اختيار إجابة قبل المتابعة 💫");
            return;
        }
        goToNext();
    }
    
    function prevStep() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            renderCurrentQuestion();
            updateNavButtons();
        }
    }

    // إضافة مستمع لحدث الضغط على Enter من لوحة المفاتيح
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && !genderSection.classList.contains('hidden') && questionsContainer.classList.contains('hidden')) {
            // لو مازال في مرحلة اختيار الجنس، لا شيء
        } else if (event.key === 'Enter' && !questionsContainer.classList.contains('hidden')) {
            // إذا كان الأسئلة ظاهرة
            event.preventDefault();
            nextStep();
        }
    });

    document.querySelectorAll('.gender-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const gender = btn.getAttribute('data-gender');
            document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            startQuiz(gender);
        });
    });
    prevBtn.addEventListener('click', prevStep);
    nextBtn.addEventListener('click', nextStep);

    questionsContainer.classList.add('hidden');
    navButtonsDiv.classList.add('hidden');
    resultContainer.classList.add('hidden');
</script>
</body>
</html>
